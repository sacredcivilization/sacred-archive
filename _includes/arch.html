<div class="iwan-arch-frame" aria-hidden="true">
  <svg class="iwan-svg" viewBox="0 0 900 80" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
    <!-- Arch 1 · Outer frame — widest, most transparent -->
    <path d="M 0,80 L 0,48 C 40,4 420,2 450,-2 C 480,2 860,4 900,48 L 900,80"
          stroke="rgba(201,168,76,0.07)" stroke-width="1.5" fill="none"/>
    <!-- Arch 2 -->
    <path d="M 55,80 L 55,52 C 88,10 425,7 450,5 C 475,7 812,10 845,52 L 845,80"
          stroke="rgba(201,168,76,0.11)" stroke-width="1" fill="none"/>
    <!-- Arch 3 -->
    <path d="M 115,80 L 115,56 C 148,18 430,14 450,12 C 470,14 752,18 785,56 L 785,80"
          stroke="rgba(201,168,76,0.17)" stroke-width="1" fill="none"/>
    <!-- Arch 4 · Inner — sharpest, most vivid -->
    <path d="M 182,80 L 182,60 C 210,26 436,22 450,20 C 464,22 690,26 718,60 L 718,80"
          stroke="rgba(201,168,76,0.27)" stroke-width="1.5" fill="none"/>
    <!-- Keystone diamond at outer apex -->
    <polygon points="450,-5 455,2 450,9 445,2" fill="rgba(201,168,76,0.55)"/>
    <!-- Inner arch apex dot -->
    <circle cx="450" cy="20" r="2" fill="rgba(201,168,76,0.38)"/>
    <!-- Cornice base line -->
    <line x1="0" y1="79.5" x2="900" y2="79.5" stroke="rgba(201,168,76,0.06)" stroke-width="0.5"/>
    <!-- Left spandrel niche (blind arcade) -->
    <path d="M 18,80 L 18,68 C 19,60 25,56 30,56 C 35,56 41,60 42,68 L 42,80"
          stroke="rgba(201,168,76,0.07)" stroke-width="0.75" fill="none"/>
    <!-- Right spandrel niche (mirror) -->
    <path d="M 858,80 L 858,68 C 859,60 865,56 870,56 C 875,56 881,60 882,68 L 882,80"
          stroke="rgba(201,168,76,0.07)" stroke-width="0.75" fill="none"/>
    <!-- Column capitals at inner arch base -->
    <line x1="174" y1="75" x2="196" y2="75" stroke="rgba(201,168,76,0.13)" stroke-width="1"/>
    <line x1="704" y1="75" x2="726" y2="75" stroke="rgba(201,168,76,0.13)" stroke-width="1"/>
    <!-- Frieze tick marks at outer base -->
    <line x1="0"   y1="76" x2="0"   y2="80" stroke="rgba(201,168,76,0.10)" stroke-width="1"/>
    <line x1="900" y1="76" x2="900" y2="80" stroke="rgba(201,168,76,0.10)" stroke-width="1"/>
  </svg>
</div>
