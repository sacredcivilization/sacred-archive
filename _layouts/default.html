<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} — {% endif %}Al-Vid Scriptorium · Sacred Research Archive</title>

  <!-- ══ CORE SEO ══ -->
  <meta name="description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}Sacred Research Archive, Al-Vid Scriptorium, SCRA, Islamic intellectual history, Sassanid civilization, Gondishapur, Syriac Christianity, Persian philosophy, Sufi transmission, Toledo translation movement, Khorasan studies, Ahl al-Bayt, civilizational archive, Saad Khizar Bosal{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- ══ OPEN GRAPH ══ -->
  <meta property="og:site_name" content="Al-Vid Scriptorium · Sacred Research Archive">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="{% if page.room or page.layout == 'page' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — Al-Vid Scriptorium{% else %}Sacred Research Archive · Al-Vid Scriptorium{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="https://dargah-ghazikot.alvidscriptorium.com/assets/images/og-default.png">
  <meta property="og:image:secure_url" content="https://dargah-ghazikot.alvidscriptorium.com/assets/images/og-default.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Sacred Research Archive — Al-Vid Scriptorium — SCRA NODE-04">

  <!-- ══ TWITTER / X CARD ══ -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — Al-Vid Scriptorium{% else %}Sacred Research Archive{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta name="twitter:image" content="https://dargah-ghazikot.alvidscriptorium.com/assets/images/og-default.png">
  <meta name="twitter:image:alt" content="Sacred Research Archive — SCRA NODE-04">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "{{ site.url }}/#website",
        "url": "{{ site.url }}/",
        "name": "Sacred Research Archive — Al-Vid Scriptorium",
        "description": "{{ site.description | strip_newlines | strip }}",
        "inLanguage": "en-US",
        "isPartOf": {
          "@type": "WebSite",
          "@id": "https://alvidscriptorium.com/#website"
        },
        "publisher": { "@id": "{{ site.url }}/#archive" }
      },
      {
        "@type": "ArchiveOrganization",
        "@id": "{{ site.url }}/#archive",
        "name": "Sacred Research Archive",
        "alternateName": ["Al-Vid Scriptorium", "SRA"],
        "url": "{{ site.url }}",
        "description": "{{ site.description | strip_newlines | strip }}",
        "foundingDate": "2026",
        "knowsAbout": [
          "Islamic Metaphysics", "Sassanid History", "Syriac Christianity",
          "Persian Philosophy", "Sufi Transmission", "Gondishapur",
          "Toledo Translation Movement", "Khorasan Studies", "Ahl al-Bayt"
        ],
        "founder": {
          "@type": "Person",
          "@id": "{{ site.url }}/#founder",
          "name": "Saad Khizar Bosal",
          "jobTitle": "Lead Architect",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Mandi Bahauddin",
            "addressRegion": "Punjab",
            "addressCountry": "PK"
          }
        },
        "sameAs": ["https://dargah-ghazikot.alvidscriptorium.com"]
      }
    ]
  }
  </script>

  {% if page.room or page.layout == 'page' %}
  <!-- ══ SCHEMA.ORG — PER-PAGE SCHOLARLY ARTICLE ══ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ScholarlyArticle",
    "@id": "{{ page.url | absolute_url }}#doc",
    "name": "{{ page.title }}",
    "headline": "{{ page.title }}",
    "description": "{% if page.description %}{{ page.description | strip_newlines | strip }}{% endif %}",
    "url": "{{ page.url | absolute_url }}",
    "inLanguage": "en",
    "author": { "@id": "{{ site.url }}/#founder" },
    "publisher": {
      "@type": "Organization",
      "name": "Sacred Civilization Research Archive",
      "url": "https://alvidscriptorium.com"
    },
    "isPartOf": { "@id": "{{ site.url }}/#website" },
    "genre": ["Islamic History", "Civilizational Studies", "Persian Philosophy", "Sufi Studies", "Source Criticism"],
    "isAccessibleForFree": true,
    "inLanguage": "en",
    "dateModified": "{{ page.last_modified_at | default: '2026-06-02' }}"
  }
  </script>
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
